name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python syntax
        run: python -m compileall -q proxy_server.py scripts/*.py

      - name: JSON well-formed
        run: |
          python <<'PY'
          import json
          import pathlib
          import sys

          root = pathlib.Path(".")
          paths = sorted(root.glob("samples/*.json")) + sorted(root.glob("schemas/*.json"))
          errs = []
          for p in paths:
              try:
                  json.loads(p.read_text(encoding="utf-8"))
              except Exception as e:
                  errs.append(f"{p}: {e}")
          if errs:
              print("\n".join(errs), file=sys.stderr)
              sys.exit(1)
          print(f"OK: {len(paths)} JSON files")
          PY
