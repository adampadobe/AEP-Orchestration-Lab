  }

    display: flex;
    flex-wrap: wrap;

        position: absolute;

    bottom: 0;
    left: 0;
    right: 0;
    background-color: var(--color-bg, var(--fallback-color-bg, white));
  }

    opacity: 1;
    -webkit-transition: opacity .4s ease-in-out;
  }

  #filebrowser-loading-page.fadeOut {
    opacity: 0;
  }

  #filebrowser-loading-page.hidden {
    display: none;
    opacity: 0;

    margin-top: 0px;
  }

    border-radius: 3px;
    height: 16px;
  }

  .filebrowser-loading-page .circle,
  .filebrowser-loading-sidebar .circle {
    border-radius: 3px;
    background-color: var(--color-bg-secondary, #f0f0f0);
    width: 16px;
    height: 16px;
  }

  .filebrowser-loading-page .row .circle,
  .filebrowser-loading-sidebar .row .circle {
    position: relative;
    top: -1px;
    left: -35px;

  function rewriteTemplateToEl(el) {
    const targetElName = el.getAttribute("data-walnut-element-as");
    let targetEl;
    try {
       if (targetElName === "svg") {
        targetEl = document.createElementNS("http://www.w3.org/2000/svg", targetElName);
        targetEl.innerHTML = el.innerHTML;
        } else {
          targetEl = document.createElement(targetElName);
        }
    } catch(_) {
      const dummyContainerEl = document.createElement("div")
      dummyContainerEl.innerHTML = "<" + targetElName + "></" + targetElName + ">"
      targetEl = dummyContainerEl.firstChild
    }
    // Copy the children
    while (el.content.firstChild) {
      targetEl.appendChild(el.content.firstChild); // *Moves* the child
    }

    // Copy the attributes
    for (let index = el.attributes.length - 1; index >= 0; --index) {
      if(el.attributes[index].name!=="data-walnut-element-as") {
              targetEl.attributes.setNamedItem(el.attributes[index].cloneNode());
      }
    }
    return targetEl
  }

  function replaceTemplates() {
    const root = document;
    let allElements = []
    const findAllElements = function(nodes) {
        for (let i = 0; i < nodes.length; i++) {
            const el = nodes[i]
            const attr = el.getAttribute('data-walnut-element-as')
            if(attr) {
              allElements.push(el)
            }
            if (el.shadowRoot) {
                findAllElements(el.shadowRoot.querySelectorAll('*'))
            }
        }
    }
    if(root.shadowRoot) {
        findAllElements(root.shadowRoot.querySelectorAll('*'))
    }
    findAllElements(root.querySelectorAll('*'));

    if (allElements.length > 0) {
      allElements.forEach((el)=> {
        const targetEl = rewriteTemplateToEl(el)
        el.replaceWith(targetEl)
      })
      replaceTemplates()
    }
  }
  
  replaceTemplates()
  window.addEventListener("DOMContentLoaded", (_event)=> {
    replaceTemplates()
  });

  const styleFilesCache = {};

  function polyfillDeclarativeShadowDOM(document) {
      function applyStyles(shadowRoot, styles) {
          if (sheetCache[styles]) {
              shadowRoot.adoptedStyleSheets.push(sheetCache[styles]);
          } else {
              sheetCache[styles] = new CSSStyleSheet();
              sheetCache[styles].replace(styles).then(() => {
                shadowRoot.adoptedStyleSheets.push(sheetCache[styles]);
              });
          }
      }

      function getAllTemplates(root) {
          const nodes = Array.from(root.querySelectorAll('*'));
          if (root.shadowRoot) {
              nodes.push(...root.shadowRoot.querySelectorAll('*'));
          }
          const elements = [];

          for (let i = 0; i < nodes.length; i++) {
              const el = nodes[i];
              if (el.tagName === 'TEMPLATE' && el.getAttribute('walnut-shadowroot-mode')) {
                  elements.push(el);
              }
              if (el.shadowRoot) {
                  elements.push(...getAllTemplates(el.shadowRoot));
              }
          }

          return elements;
      }

      function attachShadowRoots(root) {
          getAllTemplates(root)
              .forEach((template) => {
                  const mode = template.getAttribute("walnut-shadowroot-mode");
                  const dynamicStyles = template.getAttribute("data-walnut-dynamic-styles");
                  const styleUrls = [];

                  if (dynamicStyles) {
                    try {
                      styleUrls.push(...JSON.parse(dynamicStyles));
                    } catch(e) {
                      console.warn("ShadowDom: illegal dynamic styles: " + dynamicStyles);
                    }
                  }

                  const shadowRoot = template.parentNode.attachShadow({mode});
                  shadowRoot.appendChild(template.content);

                  styleUrls.forEach((styleUrl) => {
                      if (styleFilesCache.hasOwnProperty(styleUrl)) {
                          Promise.resolve(styleFilesCache[styleUrl])
                              .then((value) => {
                                  applyStyles(shadowRoot, value);
                              });
                      } else {
                          styleFilesCache[styleUrl] = fetch(styleUrl)
                              .then((response) => response.text())
                              .then((value) => {
                                applyStyles(shadowRoot, value);
                                return value;
                              });
                      }
                  });

                  template.remove();
                  attachShadowRoots(shadowRoot);
              });
      }

      attachShadowRoots(document);
  }

      polyfillDeclarativeShadowDOM(document);
  });

   function getAllStyleElems(root) {

     const nodes = Array.from(root.querySelectorAll('*'));
     const elements = Array.from(root.querySelectorAll("[data-walnut-style-rules]"));

       const el = nodes[i];
       if (el.shadowRoot) {
         // If element has shadow root, get styles from there and recurse deeper
         elements.push(...el.shadowRoot.querySelectorAll("[data-walnut-style-rules]"));
         elements.push(...getAllStyleElems(el.shadowRoot));
       }
     }

     return elements;
   }

   const styleElems = getAllStyleElems(document);

   Array.from(styleElems).forEach(styleElement => {
     const rules = JSON.parse(styleElement.getAttribute("data-walnut-style-rules"));
     const stylePropertiesList = JSON.parse(styleElement.getAttribute("data-walnut-style-set-properties"));
     //NOTE(itay): we expect to have no cssRules, if we do, it means we already applied the styles, and in that
     //case we avoid re-applying them.
     if(styleElement.sheet.cssRules.length > 0) return

     stylePropertiesList.reverse();

     rules?.reverse()?.forEach((rule, index) => {
       try {
         const RULE_INDEX = styleElement.sheet.insertRule(rule);
         const newRule = styleElement.sheet.cssRules[RULE_INDEX];
         stylePropertiesList[index]?.forEach(styleProperty => {
           const [propertyName, value, priority] = styleProperty;
           newRule.style.setProperty(propertyName, value, priority);
         })
       } catch (err) {
          // note(vadym): See https://stackoverflow.com/q/20007992 for more info
          console.warn('StyleSheet: illegal rule: ' + rule)
       }
     })

   });
 };

   walnutApplyDynamicStyles();

      }

  }

    handleDialogs(document);
  });

    // ignore
  }

      function processScrollOverShadowRoot(root) {
        processScroll(root);

        const nodes = Array.from(root.querySelectorAll("*"));
        for (let i = 0; i < nodes.length; i++) {
          const el = nodes[i];

          if (el.shadowRoot) {

            processScrollOverShadowRoot(el.shadowRoot);

      //This script applies scroll positions provided to DOM elements using the
      //data-walnut-scroll data attribute.
      function waitFor(waitExpression, handler) {
        if (waitExpression()) {
          handler();
        } else {
          window.setTimeout(waitFor.bind(null, waitExpression, handler), 10);
        }
      }

      function processScroll(root) {
        root
          .querySelectorAll(
            "[data-walnut-scroll]"
          )
          .forEach((node) => {
            const scrollData = node.getAttribute(
              "data-walnut-scroll"
            );
            const [left, top] = JSON.parse(scrollData);
            waitFor(
              () => {
                return (
                  (left > 0 && node.scrollWidth >= left) ||
                  (top > 0 && node.scrollHeight >= top)
                );
              },
              () => {
                node.style.scrollBehavior = "auto";
                node.scrollTop = top;
                node.scrollLeft = left;
              }
            );
          });
      }

      processScrollOverShadowRoot(document);
      window.addEventListener("DOMContentLoaded", (_event) => {
        processScrollOverShadowRoot(document);
      });
