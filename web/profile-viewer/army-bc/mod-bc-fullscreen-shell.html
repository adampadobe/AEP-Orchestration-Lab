<!DOCTYPE html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Army Brand Concierge — full screen</title>
    <link rel="stylesheet" href="../mod-demo-assets/army-home-snapshot_files/main.css" />
    <link rel="stylesheet" href="army-bc-inline.css" />
    <link rel="stylesheet" href="army-bc-disclaimer-layout.css" />
    <link rel="stylesheet" href="army-bc-scroll-fix.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: var(--dash-bg, #0d1117);
        color: var(--dash-text, #e6edf3);
      }
      .mod-bc-fullscreen-shell {
        display: flex;
        flex-direction: column;
        height: 100vh;
        width: 100%;
      }
      .mod-bc-fullscreen-shell .main-page-layout__header {
        flex: 0 0 auto;
        z-index: 20;
        position: relative;
        background: var(--dash-surface, #161b22);
        border-bottom: 1px solid var(--dash-border, #30363d);
      }
      .mod-bc-fullscreen-shell .site-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.65rem 1.25rem;
        min-height: 3.5rem;
        box-sizing: border-box;
      }
      .mod-bc-fullscreen-shell .site-header__logo.logo-svg {
        display: block;
        flex: 0 0 auto;
        width: 7.5rem;
        height: 2.5rem;
        min-width: 7.5rem;
        background-repeat: no-repeat;
        background-position: left center;
        background-size: contain;
      }
      .mod-bc-fullscreen-shell .site-header__actions {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex: 0 0 auto;
      }
      .mod-bc-fullscreen-shell .site-header__btn {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.4rem 0.75rem;
        border: 1px solid var(--dash-border, #30363d);
        border-radius: var(--dash-radius-sm, 12px);
        background: var(--dash-surface-alt, #21262d);
        color: var(--dash-text, #e6edf3);
        font: inherit;
        font-size: 0.8125rem;
        cursor: default;
      }
      .mod-bc-fullscreen-shell .army-bc-inline.mod-demo-army-bc-inline--fullscreen {
        flex: 1 1 auto;
        min-height: 0;
        overflow: auto;
      }
    </style>
    <script>
      !(function (n, o) {
        o.forEach(function (o) {
          n[o] ||
            ((n.__alloyNS = n.__alloyNS || []).push(o),
            (n[o] = function () {
              var u = arguments;
              return new Promise(function (i, l) {
                n[o].q.push([i, l, u]);
              });
            }),
            (n[o].q = []));
        });
      })(window, ['alloy']);
    </script>
    <script src="https://cdn1.adoberesources.net/alloy/2.32.0/alloy.min.js"></script>
    <script src="https://experience.adobe.net/solutions/experience-platform-brand-concierge-web-agent/static-assets/main.js"></script>
    <script src="army-bc-edge-path.js"></script>
    <script>
      (function () {
        var DEFAULT_DATASTREAM_ID = 'cf7272a7-f634-4bdf-9ce6-fa31ac0c6416';
        var DEFAULT_STYLE = 'styleConfigurations-6a0992.js';
        var PREFIX = '/profile-viewer/';
        var params = new URLSearchParams(window.location.search);
        var datastreamId = params.get('modDatastreamId') || DEFAULT_DATASTREAM_ID;
        if (!/^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(datastreamId)) {
          datastreamId = DEFAULT_DATASTREAM_ID;
        }
        window.__modDemoBcDatastreamId = datastreamId.toLowerCase();

        function resolveStyleUrl(raw) {
          var u = String(raw || '').trim() || DEFAULT_STYLE;
          if (/^https?:\/\//i.test(u)) return u;
          if (u.charAt(0) === '/') return u;
          return PREFIX + 'army-bc/' + u.replace(/^\.\//, '');
        }

        var styleUrl = resolveStyleUrl(params.get('modStyleConfigUrl'));
        var styleEl = document.createElement('script');
        styleEl.src = styleUrl;
        styleEl.async = false;
        styleEl.setAttribute('data-mod-bc-style-config', '1');
        document.head.appendChild(styleEl);

        styleEl.addEventListener('load', function () {
          if (typeof applyArmyBcEdgePathPatches === 'function') {
            applyArmyBcEdgePathPatches(window);
          }
          alloy('configure', {
            defaultConsent: 'in',
            edgeDomain: 'edge.adobedc.net',
            edgeBasePath: 'ee',
            datastreamId: window.__modDemoBcDatastreamId,
            orgId: 'BF9C27AA6464801C0A495FD0@AdobeOrg',
            debugEnabled: true,
            idMigrationEnabled: false,
            thirdPartyCookiesEnabled: false,
            prehidingStyle: '.personalization-container { opacity: 0 !important }',
          })
            .then(function () {
              return alloy('sendEvent', {});
            })
            .then(function () {
              if (!window.styleConfiguration) return;
              return window.adobe.concierge.bootstrap({
                instanceName: 'alloy',
                stylingConfigurations: window.styleConfiguration,
                selector: '#brand-concierge-mount',
                stickySession: false,
              });
            })
            .then(function () {
              window.__modDemoBcBootstrapped = true;
              if (typeof applyArmyBcEdgePathPatches === 'function') {
                applyArmyBcEdgePathPatches(window);
              }
              [100, 500, 1500, 3000].forEach(function (ms) {
                setTimeout(function () {
                  if (typeof applyArmyBcEdgePathPatches === 'function') {
                    applyArmyBcEdgePathPatches(window);
                  }
                }, ms);
              });
            })
            .catch(function (err) {
              console.error('[mod-bc-fullscreen-shell] init failed', err);
            });
        });
        styleEl.addEventListener('error', function () {
          console.error('[mod-bc-fullscreen-shell] failed to load style configuration', styleUrl);
        });
      })();
    </script>
    <style>
      .bc-card__image {
        background-size: cover !important;
        background-position: center !important;
      }
    </style>
  </head>
  <body class="mod-bc-fullscreen-shell-page">
    <div class="mod-bc-fullscreen-shell">
      <header class="main-page-layout__header">
        <div class="site-header">
          <a class="site-header__logo logo-svg current" aria-current="page" href="https://www.army.mod.uk/">
            <span class="visually-hidden">British Army</span>
          </a>
          <div class="site-header__actions">
            <button type="button" class="site-header__btn site-header__btn--search">
              <span class="site-header__btn-text">Search</span>
              <i class="site-header__btn-icon" aria-hidden="true"></i>
            </button>
            <button type="button" class="site-header__btn site-header__btn--menu">
              <span class="site-header__btn-text">Menu</span>
              <i class="site-header__btn-icon" aria-hidden="true"></i>
            </button>
          </div>
        </div>
      </header>
      <section class="army-bc-inline mod-demo-army-bc-inline--fullscreen" aria-label="Army recruitment assistant">
        <div id="brand-concierge-mount" class="army-bc-inline__mount"></div>
      </section>
    </div>
    <script src="army-bc-scroll-fix.js"></script>
    <script src="army-bc-disclaimer-layout.js"></script>
  </body>
</html>
