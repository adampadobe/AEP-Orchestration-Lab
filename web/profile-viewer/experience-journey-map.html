<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Experience journey map — reference layout</title>
  <style>
    :root {
      --canvas-bg: #f4f5f7;
      --path-line: #d4d8e0;
      --ink: #1a1a1a;
      --ink-soft: #5c6370;
      --ink-mute: #8b919d;
      --accent-blue: #1473e6;
      --node-orange: #f57c00;
      --panel-bg: #ffffff;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
      --radius-lg: 16px;
      --radius-sm: 10px;
      --adobe-red: #e60000;
      --tap-ring: #1473e6;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #e8eaef;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 80px;
    }

    .page-title {
      font-size: 0.85rem;
      color: var(--ink-mute);
      margin-bottom: 12px;
      text-align: center;
      max-width: 720px;
    }

    /* ── Main canvas (not full viewport height) ─────────────────────── */
    .journey-app {
      width: 100%;
      max-width: 1240px;
      background: var(--canvas-bg);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 20px 24px 56px;
      position: relative;
      min-height: 520px;
      max-height: min(680px, 88vh);
      display: flex;
      flex-direction: column;
    }

    .deck-header {
      margin-bottom: 8px;
    }
    .deck-title {
      font-size: clamp(1.35rem, 2.8vw, 1.75rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--ink);
      line-height: 1.15;
    }
    .deck-subtitle {
      font-size: clamp(0.8rem, 1.6vw, 0.95rem);
      color: var(--ink-soft);
      font-weight: 500;
      margin-top: 4px;
    }

    .persona-row {
      display: grid;
      grid-template-columns: 72px 1fr;
      gap: 14px 18px;
      align-items: start;
      max-width: 560px;
      margin: 14px 0 10px;
    }
    .persona-photo-cell {
      position: relative;
      width: 72px;
      height: 72px;
    }
    .persona-avatar,
    .persona-avatar-ph {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid #fff;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }
    .persona-avatar {
      object-fit: cover;
      position: absolute;
      left: 0;
      top: 0;
      background: #e3e6eb;
    }
    .persona-avatar-ph {
      background: linear-gradient(145deg, #e3e6eb, #cfd4dd);
    }
    .persona-name {
      font-size: 1rem;
      font-weight: 800;
      color: var(--ink);
    }
    .persona-role {
      font-size: 0.78rem;
      color: var(--ink-soft);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .persona-signals {
      grid-column: 1 / -1;
      font-size: 0.72rem;
      color: var(--ink-mute);
      line-height: 1.45;
      padding: 8px 10px;
      background: rgba(255,255,255,0.75);
      border-radius: var(--radius-sm);
      border: 1px solid rgba(0,0,0,0.06);
    }

    /* ── SVG stage ──────────────────────────────────────────────────── */
    .svg-stage-wrap {
      position: relative;
      width: 100%;
      margin-top: 8px;
      flex: 1 1 auto;
      min-height: 280px;
      aspect-ratio: 1200 / 420;
      max-height: 400px;
    }
    .svg-stage {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Floating state cards — pixel-aligned to path via getScreenCTM */
    .floating-layer {
      position: absolute;
      left: 0;
      top: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
    }
    .state-float {
      position: absolute;
      pointer-events: auto;
      transform: translate(-50%, -50%);
      transition: opacity 0.35s ease, transform 0.35s ease, filter 0.35s ease;
      max-width: min(240px, 28vw);
      z-index: 1;
    }
    .journey-app.is-ready .state-float { transition: opacity 0.35s ease, transform 0.35s ease, filter 0.35s ease; }

    .state-float.is-active {
      z-index: 10;
      filter: none;
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.02);
    }
    .state-float:not(.is-active) {
      opacity: 0.42;
      filter: saturate(0.65);
    }

    .float-inner {
      background: var(--panel-bg);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow);
      border: 1px solid rgba(0,0,0,0.06);
      overflow: hidden;
    }
    .float-title {
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--ink);
      padding: 8px 10px 0;
      line-height: 1.25;
    }
    .float-desc {
      font-size: 0.68rem;
      color: var(--ink-soft);
      padding: 4px 10px 10px;
      line-height: 1.4;
    }

    /* Device chrome */
    .device {
      margin: 6px 8px 0;
      border-radius: 10px;
      overflow: hidden;
      background: #0f1114;
      border: 1px solid #2a2e35;
    }
    .device--mobile {
      width: 88px;
      margin-left: auto;
      margin-right: auto;
      aspect-ratio: 9 / 18;
    }
    .device--tablet {
      width: 100%;
      max-width: 200px;
      margin-left: auto;
      margin-right: auto;
      aspect-ratio: 4 / 3;
    }
    .device--desktop {
      width: 100%;
      max-width: 220px;
      margin-left: auto;
      margin-right: auto;
      aspect-ratio: 16 / 10;
    }
    .device-bar {
      height: 8px;
      background: #2a2e35;
      display: flex;
      align-items: center;
      gap: 3px;
      padding: 0 6px;
    }
    .device-bar span {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #5c6370;
    }
    .device-screen {
      position: relative;
      height: calc(100% - 8px);
      background: linear-gradient(180deg, #f8f9fb 0%, #eef0f4 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.55rem;
      color: var(--ink-mute);
      text-align: center;
      padding: 6px;
    }
    .device-screen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .channel-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--accent-blue);
      padding: 0 10px 6px;
    }

    /* Controls */
    .nav-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 18px;
      padding-top: 12px;
      border-top: 1px solid rgba(0,0,0,0.06);
    }
    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 999px;
      border: 1.5px solid #c9ced8;
      background: #fff;
      font-weight: 700;
      font-size: 0.82rem;
      cursor: pointer;
      font-family: inherit;
      color: var(--ink);
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }
    .nav-btn:hover:not(:disabled) {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      background: rgba(20, 115, 230, 0.06);
    }
    .nav-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .nav-btn--primary {
      background: var(--accent-blue);
      border-color: var(--accent-blue);
      color: #fff;
    }
    .nav-btn--primary:hover:not(:disabled) {
      background: #0d62c4;
      border-color: #0d62c4;
      color: #fff;
    }
    .nav-hint {
      font-size: 0.68rem;
      color: var(--ink-mute);
      text-align: center;
      flex: 1;
    }

    .deck-footer {
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.65rem;
      color: var(--ink-mute);
    }
    .adobe-wordmark {
      font-weight: 800;
      color: var(--adobe-red);
      letter-spacing: -0.02em;
    }
    .copyright { text-align: right; max-width: 55%; line-height: 1.3; }

    @media (max-width: 720px) {
      .state-float { max-width: 38vw; }
      .persona-row { max-width: 100%; }
    }
  </style>
</head>
<body>
  <p class="page-title">Standalone reference: artistic journey map (JSON-driven). Embed or port into the lab as needed.</p>

  <div class="journey-app" id="journeyApp" aria-live="polite">
    <header class="deck-header">
      <div class="deck-title" id="deckTitle"></div>
      <div class="deck-subtitle" id="deckSubtitle"></div>
    </header>

    <div class="persona-row" id="personaBlock">
      <div class="persona-photo-cell">
        <img class="persona-avatar" id="personaAvatar" alt="" width="72" height="72" hidden>
        <div class="persona-avatar-ph" id="personaAvatarPh" aria-hidden="true"></div>
      </div>
      <div>
        <div class="persona-name" id="personaName"></div>
        <div class="persona-role" id="personaRole"></div>
      </div>
      <div class="persona-signals" id="personaSignals"></div>
    </div>

    <div class="svg-stage-wrap" id="stageWrap">
      <svg class="svg-stage" id="journeySvg" viewBox="0 0 1200 420" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
        <!-- W-shaped journey path -->
        <path id="journeyPath" fill="none" stroke="var(--path-line)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
          d="M 56 320 C 160 100, 280 360, 420 200 C 520 80, 620 100, 700 240 C 780 380, 860 360, 940 140 C 1000 60, 1080 120, 1144 260" />
        <g id="pathDecorations"></g>
      </svg>
      <div class="floating-layer" id="floatLayer"></div>
    </div>

    <div class="nav-row">
      <button type="button" class="nav-btn" id="btnPrev">◀ Previous</button>
      <span class="nav-hint" id="navHint">Use Previous / Next to walk the journey.</span>
      <button type="button" class="nav-btn nav-btn--primary" id="btnNext">Next ▶</button>
    </div>

    <footer class="deck-footer">
      <span class="adobe-wordmark">Adobe</span>
      <span class="copyright" id="footerCopy"></span>
    </footer>
  </div>

  <script>
(function () {
  'use strict';

  /**
   * JSON schema (root object):
   *   title, subtitle — strings
   *   persona — { name, role, roleIcon?, signals, avatarUrl? }
   *   states — array of:
   *     { id, channel, icon?, image?, title, description,
   *       nodeType?: "tap" | "marker",   // tap = blue hand circle; marker = orange dot on path
   *       point?: { x, y },              // optional anchor in SVG viewBox 0–1200 × 0–420
   *       offsetLabel?: { dx, dy } }    // pixel offset for floating card from anchor (default dy 52)
   *
   * window.loadJourneyMap(data) accepts this object OR a bare array of states
   * (wrapped as { states: data }).
   */
  var journeyModel = {
    title: 'Experience Elevation',
    subtitle: 'Driving engagement & loyalty',
    persona: {
      name: 'Adam | First Time With Flynas',
      role: 'New traveler',
      roleIcon: '✈',
      signals: 'Anonymous to Known, initial engagement, re-engagement, consent aware, real-time & AI driven.',
      avatarUrl: ''
    },
    states: [
      { id: 's1', channel: 'web', icon: 'browser', image: '', nodeType: 'tap', title: 'Abandoning his booking', description: 'Retargeting after an abandoned booking session.', offsetLabel: { dx: 0, dy: 56 } },
      { id: 's2', channel: 'website', icon: 'browser', image: '', title: 'Lands on Flynas.com', description: 'Adam clicks through from another site and lands on the airline website.', offsetLabel: { dx: 90, dy: -8 } },
      { id: 's3', channel: 'web', icon: 'browser', image: '', nodeType: 'marker', title: 'Consideration', description: 'Browsing fares and ancillaries on desktop.', offsetLabel: { dx: -40, dy: 70 } },
      { id: 's4', channel: 'mobile', icon: 'app', image: '', nodeType: 'tap', title: 'Completes the booking', description: 'Adam completes the Flynas booking on mobile.', offsetLabel: { dx: 0, dy: 58 } },
      { id: 's5', channel: 'mobile', icon: 'push', image: '', title: 'Airport welcome', description: 'Push notification as he arrives at the airport.', offsetLabel: { dx: 72, dy: -20 } },
      { id: 's6', channel: 'mobile', icon: 'push', image: '', title: 'Flight delayed', description: 'Real-time communications for the delay.', offsetLabel: { dx: 72, dy: 64 } },
      { id: 's7', channel: 'web', icon: 'browser', image: '', nodeType: 'marker', title: 'In-flight service', description: 'Cabin crew offers a tailored service moment.', offsetLabel: { dx: -60, dy: 72 } },
      { id: 's8', channel: 'tablet', icon: 'app', image: '', title: 'Crew tablet', description: 'Tablet dashboard used to recognise Adam\'s preferences.', offsetLabel: { dx: 0, dy: 58 } },
      { id: 's9', channel: 'mobile', icon: 'app', image: '', title: 'Post-trip feedback', description: 'Engagement after the journey ends.', offsetLabel: { dx: 64, dy: -24 } }
    ]
  };

  var pathEl = document.getElementById('journeyPath');
  var decorG = document.getElementById('pathDecorations');
  var floatLayer = document.getElementById('floatLayer');
  var stageWrap = document.getElementById('stageWrap');
  var app = document.getElementById('journeyApp');
  var btnPrev = document.getElementById('btnPrev');
  var btnNext = document.getElementById('btnNext');
  var navHint = document.getElementById('navHint');

  var current = 0;
  var stateEls = [];
  var markerEls = [];

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function deviceClass(ch) {
    var c = String(ch || '').toLowerCase();
    if (c === 'mobile' || c === 'push' || c === 'sms') return 'device device--mobile';
    if (c === 'tablet' || c === 'email') return 'device device--tablet';
    return 'device device--desktop';
  }

  function pointOnPath(path, t) {
    try {
      var len = path.getTotalLength();
      var p = path.getPointAtLength(len * Math.max(0, Math.min(1, t)));
      return { x: p.x, y: p.y };
    } catch (e) {
      return { x: 600, y: 210 };
    }
  }

  function layoutFromData(data) {
    document.getElementById('deckTitle').textContent = data.title || '';
    document.getElementById('deckSubtitle').textContent = data.subtitle || '';
    var p = data.persona || {};
    document.getElementById('personaName').textContent = p.name || '';
    document.getElementById('personaRole').innerHTML = '<span aria-hidden="true">' + escapeHtml(p.roleIcon || '') + '</span> ' + escapeHtml(p.role || '');
    document.getElementById('personaSignals').textContent = p.signals || '';
    var img = document.getElementById('personaAvatar');
    var ph = document.getElementById('personaAvatarPh');
    if (p.avatarUrl) {
      img.src = p.avatarUrl;
      img.hidden = false;
      ph.style.display = 'none';
    } else {
      img.hidden = true;
      ph.style.display = 'block';
    }
    document.getElementById('footerCopy').textContent = '© ' + new Date().getFullYear() + ' Adobe. All Rights Reserved. Adobe Confidential.';

    var states = Array.isArray(data.states) ? data.states : [];
    var n = states.length;
    decorG.innerHTML = '';
    floatLayer.innerHTML = '';
    stateEls = [];
    markerEls = [];

    for (var i = 0; i < n; i++) {
      var st = states[i];
      var t = n === 1 ? 0.5 : i / (n - 1);
      var pt = st.point || pointOnPath(pathEl, 0.04 + t * 0.92);

      var nodeType = st.nodeType || 'marker';
      if (nodeType === 'tap') {
        var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('transform', 'translate(' + pt.x + ',' + pt.y + ')');
        var tc = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        tc.setAttribute('r', '22');
        tc.setAttribute('fill', 'var(--tap-ring)');
        tc.setAttribute('opacity', '0.95');
        g.appendChild(tc);
        var tx = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        tx.setAttribute('text-anchor', 'middle');
        tx.setAttribute('y', '6');
        tx.setAttribute('fill', '#fff');
        tx.setAttribute('font-size', '18');
        tx.setAttribute('font-family', 'system-ui, sans-serif');
        tx.textContent = '☝';
        g.appendChild(tx);
        decorG.appendChild(g);
        markerEls.push({ kind: 'tap', el: g, index: i, basePt: { x: pt.x, y: pt.y } });
      } else {
        var c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        c.setAttribute('cx', pt.x);
        c.setAttribute('cy', pt.y);
        c.setAttribute('r', 7);
        c.setAttribute('fill', 'var(--node-orange)');
        c.setAttribute('stroke', '#fff');
        c.setAttribute('stroke-width', '2');
        decorG.appendChild(c);
        markerEls.push({ kind: 'marker', el: c, index: i });
      }

      var wrap = document.createElement('div');
      wrap.className = 'state-float';
      wrap.dataset.index = String(i);
      wrap.dataset.offDx = String((st.offsetLabel && st.offsetLabel.dx) || 0);
      wrap.dataset.offDy = String((st.offsetLabel && st.offsetLabel.dy) || 52);

      var inner = document.createElement('div');
      inner.className = 'float-inner';
      var badge = document.createElement('div');
      badge.className = 'channel-badge';
      badge.textContent = String(st.channel || 'channel');
      var dev = document.createElement('div');
      dev.className = deviceClass(st.channel);
      dev.innerHTML = '<div class="device-bar"><span></span><span></span><span></span></div><div class="device-screen">' +
        (st.image ? '<img src="' + escapeHtml(st.image) + '" alt="">' : escapeHtml(st.title)) + '</div>';
      var ttl = document.createElement('div');
      ttl.className = 'float-title';
      ttl.textContent = st.title || '';
      var desc = document.createElement('div');
      desc.className = 'float-desc';
      desc.textContent = st.description || '';
      inner.appendChild(badge);
      inner.appendChild(dev);
      inner.appendChild(ttl);
      inner.appendChild(desc);
      wrap.appendChild(inner);
      floatLayer.appendChild(wrap);
      stateEls.push(wrap);
    }

    app.classList.add('is-ready');
    setActive(0);
    requestAnimationFrame(function () {
      syncFloatPositions();
      requestAnimationFrame(syncFloatPositions);
    });
  }

  function setActive(i) {
    var states = journeyModel.states || [];
    var n = states.length;
    current = Math.max(0, Math.min(n - 1, i));
    stateEls.forEach(function (el, j) {
      el.classList.toggle('is-active', j === current);
    });
    markerEls.forEach(function (m) {
      if (m.kind === 'marker') {
        m.el.setAttribute('fill', m.index === current ? '#ff8f00' : 'var(--node-orange)');
        m.el.setAttribute('r', m.index === current ? 10 : 7);
        m.el.setAttribute('stroke', '#fff');
        m.el.setAttribute('stroke-width', m.index === current ? '3' : '2');
      } else if (m.kind === 'tap' && m.basePt) {
        var scale = m.index === current ? 1.14 : 1;
        m.el.setAttribute('transform', 'translate(' + m.basePt.x + ',' + m.basePt.y + ') scale(' + scale + ')');
      }
    });
    btnPrev.disabled = current <= 0;
    btnNext.disabled = current >= n - 1;
    var st = states[current];
    navHint.textContent = st ? ('Focused: ' + st.title) : '';
  }

  btnPrev.addEventListener('click', function () { setActive(current - 1); });
  btnNext.addEventListener('click', function () { setActive(current + 1); });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'ArrowLeft') { e.preventDefault(); setActive(current - 1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); setActive(current + 1); }
  });

  /** Public hook: load journey from JSON object or a bare array of states. */
  window.loadJourneyMap = function (data) {
    if (Array.isArray(data)) {
      data = { title: '', subtitle: '', persona: {}, states: data };
    }
    if (!data || typeof data !== 'object') return;
    journeyModel = data;
    layoutFromData(journeyModel);
  };

  function svgPointToLayerPx(svg, pt, wrapRect) {
    var p0 = svg.createSVGPoint();
    p0.x = pt.x;
    p0.y = pt.y;
    var ctm = svg.getScreenCTM();
    if (!ctm) return { left: 0, top: 0 };
    var scr = p0.matrixTransform(ctm);
    return { left: scr.x - wrapRect.left, top: scr.y - wrapRect.top };
  }

  function syncFloatPositions() {
    var svg = document.getElementById('journeySvg');
    if (!svg || !pathEl) return;
    var wrapRect = stageWrap.getBoundingClientRect();
    var states = journeyModel.states || [];
    var n = states.length;
    stateEls.forEach(function (el, i) {
      var st = states[i];
      var t = n === 1 ? 0.5 : i / (n - 1);
      var pt = st.point || pointOnPath(pathEl, 0.04 + t * 0.92);
      var offDx = Number(el.dataset.offDx) || 0;
      var offDy = Number(el.dataset.offDy) || 0;
      var scr = svgPointToLayerPx(svg, pt, wrapRect);
      el.style.left = (scr.left + offDx) + 'px';
      el.style.top = (scr.top + offDy) + 'px';
      el.style.transform = 'translate(-50%, -50%)';
    });
  }

  layoutFromData(journeyModel);
  syncFloatPositions();
  window.addEventListener('resize', syncFloatPositions);

  requestAnimationFrame(function () { syncFloatPositions(); });
})();
  </script>
</body>
</html>
