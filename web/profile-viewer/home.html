  <script>
    (function () {
      if (!window.AepAccessScope) return;
      if (window.AepAccessOnboarding && typeof window.AepAccessOnboarding.init === 'function') {
        window.AepAccessOnboarding.init();
      }
      function initHomeAccessModePanel() {
        var openBtn = document.getElementById('aepAccessModeOpenBtn');
        var statusEl = document.getElementById('aepAccessModeStatus');
        var summaryEl = document.getElementById('aepAccessModeSummary');
        var toggleWrap = document.getElementById('aepAccessModeToggleWrap');
        var btnSandbox = document.getElementById('aepAccessToggleSandbox');
        var btnWorkspace = document.getElementById('aepAccessToggleWorkspace');
        if (!summaryEl || !statusEl) return;

        function syncToggleUi() {
          if (!toggleWrap || !btnSandbox || !btnWorkspace) return;
          var hasMode = window.AepAccessScope.hasExplicitMode();
          toggleWrap.hidden = !hasMode;
          if (!hasMode) return;
          var mode = window.AepAccessScope.getAccessMode();
          var isSandbox = mode === 'sandbox';
          btnSandbox.setAttribute('class', isSandbox ? 'dashboard-btn-primary' : 'dashboard-btn-outline');
          btnWorkspace.setAttribute('class', !isSandbox ? 'dashboard-btn-primary' : 'dashboard-btn-outline');
          btnSandbox.setAttribute('aria-pressed', isSandbox ? 'true' : 'false');
          btnWorkspace.setAttribute('aria-pressed', !isSandbox ? 'true' : 'false');
        }

        function trySwitchAccessMode(target) {
          var cur = window.AepAccessScope.getAccessMode();
          if (cur === target) return;
          var msg =
            target === 'sandbox'
              ? 'Switch to Adobe sandbox? No-sandbox tools stay idle until you switch back. Your saved workspace keys are kept.'
              : 'Switch to no Adobe sandbox? Sandbox-backed tools will follow workspace scope until you switch again.';
          if (!window.confirm(msg)) return;
          if (target === 'sandbox') {
            window.AepAccessScope.setAccessMode('sandbox');
            return;
          }
          var slug = window.AepAccessScope.getWorkspaceSlug();
          if (!slug) {
            try {
              window.__aepOnboardingPreferWorkspace = true;
            } catch (_e) {}
            if (window.AepAccessOnboarding && typeof window.AepAccessOnboarding.open === 'function') {
              window.AepAccessOnboarding.open();
            }
            return;
          }
          window.AepAccessScope.setAccessMode('workspace');
        }

        function syncUi() {
          var scope = window.AepAccessScope.getScope();
          summaryEl.textContent = scope.mode === 'workspace'
            ? ('No-sandbox workspace: ' + (scope.workspaceName || scope.scopeId || 'not configured'))
            : 'Adobe sandbox mode';
          syncToggleUi();
        }
        function refreshAccessStatusHint() {
          if (!window.AepAccessScope.hasExplicitMode()) {
            statusEl.textContent = 'Choose your access mode to continue.';
          } else if (
            window.AepAccessOnboarding &&
            typeof window.AepAccessOnboarding.hasAdobeLabFirebaseSession === 'function' &&
            !window.AepAccessOnboarding.hasAdobeLabFirebaseSession()
          ) {
            statusEl.textContent = 'Sign in with Adobe @adobe.com (Login in Configure access mode).';
          } else {
            statusEl.textContent = '';
          }
        }
        if (btnSandbox) {
          btnSandbox.addEventListener('click', function () {
            trySwitchAccessMode('sandbox');
          });
        }
        if (btnWorkspace) {
          btnWorkspace.addEventListener('click', function () {
            trySwitchAccessMode('workspace');
          });
        }
        if (openBtn) {
          openBtn.addEventListener('click', function () {
            if (window.AepAccessOnboarding && typeof window.AepAccessOnboarding.open === 'function') {
              window.AepAccessOnboarding.open();
              statusEl.textContent = '';
            }
          });
        }
        window.addEventListener('aep-access-scope-change', function () {
          syncUi();
          refreshAccessStatusHint();
        });
        window.addEventListener('aep-lab-email-session-updated', refreshAccessStatusHint);
        window.addEventListener('aep-lab-google-session-updated', refreshAccessStatusHint);
        syncUi();
        refreshAccessStatusHint();
      }
      window.addEventListener('aep-deferred-dashboard-mounted', initHomeAccessModePanel, { once: true });
    })();
  </script>
